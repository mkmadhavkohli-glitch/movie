<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
height:100vh;
background:linear-gradient(120deg,#0f0c29,#302b63,#24243e);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.box{
background:rgba(255,255,255,0.08);

width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;

border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#7df9ff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Old User Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){
window.location.href="main.html"
}

</script>

</body>
</html>
