<!DOCTYPE html>
<html>
<head>
<title>MoodFlix</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(120deg,#0f0c29,#302b63,#24243e);

color:white;

}

/* navbar */

.navbar{

display:flex;

justify-content:space-between;

padding:20px 60px;

}

.logo{

font-size:26px;

color:#7df9ff;

font-weight:bold;

}

.logout{

background:#7df9ff;

border:none;

padding:8px 15px;

border-radius:6px;

cursor:pointer;

}

/* main section */

.hero{

text-align:center;

margin-top:100px;

}

.hero h1{

font-size:50px;

margin-bottom:10px;

}

.hero p{

color:#bbb;

margin-bottom:40px;

}

/* mood buttons */

.mood-container{

display:grid;

grid-template-columns:repeat(3,150px);

gap:20px;

justify-content:center;

}

button{

padding:18px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.08);

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

box-shadow:0 0 15px #7df9ff;

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MoodFlix</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="hero">

<h1>Select Your Mood</h1>

<p>Movie recommendations will be generated by backend</p>

<div class="mood-container">

<button onclick="sendMood('happy')">😊 Happy</button>

<button onclick="sendMood('sad')">😢 Sad</button>

<button onclick="sendMood('romantic')">❤️ Romantic</button>

<button onclick="sendMood('excited')">🔥 Excited</button>

<button onclick="sendMood('depressed')">😞 Depressed</button>

<button onclick="sendMood('relaxed')">😌 Relaxed</button>

</div>

</div>

<script>

function sendMood(mood){

fetch("http://localhost:5000/mood",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({mood:mood})

})

.then(res=>res.json())

.then(data=>{

console.log(data)

})

}

function logout(){

window.location.href="login.html"

}

</script>

</body>
</html>
